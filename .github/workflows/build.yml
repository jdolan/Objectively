name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Install dependencies
      run: brew install autoconf automake libtool pkg-config check

    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: |
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)

    - name: Test
      run: make check

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          libcurl4-openssl-dev \
          check

    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: |
        autoreconf -i
        ./configure
        make -j$(nproc)

    - name: Test
      run: make check
