name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Install dependencies
      run: brew install autoconf automake libtool pkg-config check

    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: |
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)

    - name: Test
      run: make check
      env:
        CK_FORK: "no"

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          libcurl4-openssl-dev \
          check

    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: |
        autoreconf -i
        ./configure
        make -j$(nproc)

    - name: Test
      run: make check
      env:
        CK_FORK: "no"

  build-windows:
    runs-on: windows-latest

    env:
      SOLUTION_FILE_PATH: Objectively.vs15/Objectively.sln
      BUILD_CONFIGURATION: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 ${{ env.SOLUTION_FILE_PATH }}

  release:
    needs: [build-macos, build-linux, build-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Create release
      run: |
        gh release delete latest --yes --cleanup-tag || true
        gh release create latest \
          --title "Objectively Latest" \
          --notes "Latest build from the \`main\` branch." \
          --prerelease
      env:
        GH_TOKEN: ${{ github.token }}
