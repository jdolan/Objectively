name: Release

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write

jobs:
  release-xcframework:
    runs-on: macos-14

    steps:
    # The Xcode "Configure" build phase runs autoreconf/configure when built from
    # source (i.e. whenever Config.h isn't already present); the macOS runner
    # image doesn't ship autotools by default.
    - name: Install autotools
      run: brew install autoconf automake libtool pkg-config

    - name: Checkout
      uses: actions/checkout@v6

    # curl publishes no prebuilt Apple xcframework, so build it from source.
    # build-libcurl.sh owns the curl version and deployment floors; the cache key
    # tracks the script itself, so bumping either invalidates the cache.
    - name: Cache libcurl.xcframework
      uses: actions/cache@v4
      with:
        path: Frameworks/libcurl.xcframework
        key: libcurl-${{ hashFiles('Frameworks/build-libcurl.sh') }}

    - name: Build libcurl.xcframework
      run: bash ./Frameworks/build-libcurl.sh

    # Build Objectively.framework straight from the Xcode target (single source of
    # truth — no duplicated file list) for each Apple platform, then combine.
    # macOS finds curl via Homebrew; iOS has no system curl, so feed the headers
    # from libcurl.xcframework with an additive -I (curl is still resolved at load
    # time via -undefined dynamic_lookup, not linked into the framework).
    - name: Build Objectively.xcframework
      run: |
        set -euo pipefail
        rm -rf build
        curl_ios="$PWD/Frameworks/libcurl.xcframework/ios-arm64/Headers"
        curl_sim="$PWD/Frameworks/libcurl.xcframework/ios-arm64_x86_64-simulator/Headers"

        xcodebuild archive -workspace Objectively.xcworkspace -scheme Objectively \
          -destination "generic/platform=macOS" -archivePath build/macOS \
          SKIP_INSTALL=NO CODE_SIGNING_ALLOWED=NO

        xcodebuild archive -workspace Objectively.xcworkspace -scheme Objectively \
          -destination "generic/platform=iOS" -archivePath build/iOS \
          SKIP_INSTALL=NO CODE_SIGNING_ALLOWED=NO \
          OTHER_CFLAGS="\$(inherited) -I$curl_ios"

        xcodebuild archive -workspace Objectively.xcworkspace -scheme Objectively \
          -destination "generic/platform=iOS Simulator" -archivePath build/iOS_Simulator \
          SKIP_INSTALL=NO CODE_SIGNING_ALLOWED=NO \
          OTHER_CFLAGS="\$(inherited) -I$curl_sim"

        xcodebuild -create-xcframework \
          -framework build/macOS.xcarchive/Products/Library/Frameworks/Objectively.framework \
          -framework build/iOS.xcarchive/Products/Library/Frameworks/Objectively.framework \
          -framework build/iOS_Simulator.xcarchive/Products/Library/Frameworks/Objectively.framework \
          -output Frameworks/Objectively.xcframework

    - name: Zip xcframeworks
      run: |
        cd Frameworks
        zip -r ../libcurl.xcframework.zip libcurl.xcframework
        zip -r ../Objectively.xcframework.zip Objectively.xcframework

    - name: Create release
      run: |
        gh release delete ${{ github.ref_name }} --yes || true
        gh release create ${{ github.ref_name }} \
          --title "Objectively ${{ github.ref_name }}" \
          --generate-notes \
          libcurl.xcframework.zip \
          Objectively.xcframework.zip
      env:
        GH_TOKEN: ${{ github.token }}
